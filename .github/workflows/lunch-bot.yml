name: lunch-menu-bot

on:
  schedule:
    # 00:00 UTC = 09:00 KST, 평일(월~금)만 실행
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}   # Actions 탭에서 수동 테스트 가능

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lunch bot
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}       # Power Automate 트리거 URL
          WEBHOOK_TYPE: ${{ secrets.WEBHOOK_TYPE }}     # (선택) 기본값 teams
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # (선택) 칼로리 추정
        run: python scrape_menu.py
